# Auto-Rebase Dependabot PRs
# ─────────────────────────────────────────────────────────────
# Khi main có code mới (PR merged), tự động rebase tất cả
# Dependabot PRs đang mở để tránh conflict.
# ─────────────────────────────────────────────────────────────

name: Rebase Dependabot PRs

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: Rebase all open Dependabot PRs
        run: |
          echo "🔄 Fetching open Dependabot PRs..."

          PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --author "dependabot[bot]" \
            --state open \
            --json number,title \
            --jq '.[].number')

          if [ -z "$PRS" ]; then
            echo "✅ No open Dependabot PRs to rebase."
            exit 0
          fi

          echo "Found PRs: $PRS"

          for PR_NUM in $PRS; do
            echo "📌 Rebasing PR #$PR_NUM..."
            gh pr comment "$PR_NUM" \
              --repo "${{ github.repository }}" \
              --body "@dependabot rebase" \
              || echo "⚠️ Failed to rebase PR #$PR_NUM (may already be up-to-date)"
            sleep 2
          done

          echo "✅ Rebase commands sent to all open Dependabot PRs."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
