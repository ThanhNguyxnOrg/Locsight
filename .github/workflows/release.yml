name: Release

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Parse version, extract changelog, create tag + draft release ──
  create-release:
    # Only run if commit message starts with "release: v"
    if: "startsWith(github.event.head_commit.message, 'release: v')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse version from commit message
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          # Get the first line of the commit message
          FIRST_LINE=$(echo "$MSG" | head -n 1)
          if [[ "$FIRST_LINE" =~ ^release:\ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "Parsed version: $VERSION"
          else
            echo "::error::Commit message first line '$FIRST_LINE' does not match 'release: vX.Y.Z'"
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Use awk to extract the changelog section for the specific version
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) found=1; next }
            found { print }
          ' CHANGELOG.md)
          
          if [ -z "$BODY" ]; then
            BODY="Release v${VERSION} — see CHANGELOG.md for details."
            echo "No changelog section found in CHANGELOG.md for [$VERSION]. Using fallback."
          fi
          
          {
            echo "$BODY"
            echo ""
            echo "---"
            echo ""
            echo "### 📦 Downloads"
            echo ""
            echo "| Platform | Architecture | Setup Installer / Binary |"
            echo "|----------|-------------|-------------------------|"
            echo "| 🪟 Windows | x64 | \`.msi\` / \`.exe\` (NSIS) |"
            echo "| 🪟 Windows | ARM64 | \`.msi\` / \`.exe\` (NSIS) |"
            echo "| 🍎 macOS | Apple Silicon (ARM64) | \`.dmg\` |"
            echo "| 🍎 macOS | Intel (x64) | \`.dmg\` |"
            echo "| 🐧 Linux | x64 | \`.deb\` / \`.AppImage\` |"
            echo "| 🐧 Linux | ARM64 | \`.deb\` / \`.AppImage\` |"
          } > release_body.md

      - name: Bump version in config files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Update package.json
          jq '.version = "'$VERSION'"' package.json > temp.json && mv temp.json package.json
          
          # Update src-tauri/tauri.conf.json
          jq '.version = "'$VERSION'"' src-tauri/tauri.conf.json > temp.json && mv temp.json src-tauri/tauri.conf.json
          
          # Update src-tauri/Cargo.toml
          sed -i 's/^version = ".*"/version = "'$VERSION'"/' src-tauri/Cargo.toml
          
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit changes
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "ci: bump version to v$VERSION [skip ci]" || echo "No changes to commit"
          
          # Push changes back to main branch
          git push origin HEAD:main || echo "Warning: Could not push to main branch directly, continuing with tagging."
          
          # Tag the version-bumped commit
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "🚀 Locsight ${{ steps.version.outputs.tag }}"
          body_path: release_body.md
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Build on 6 targets and upload artifacts to release ──
  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: '--target aarch64-pc-windows-msvc'
            rust_target: 'aarch64-pc-windows-msvc'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: ubuntu-22.04-arm
            args: ''
            rust_target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install MSVC ARM64 Build Tools (Windows ARM64)
        if: matrix.rust_target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $vsPath = vswhere -latest -property installationPath
          echo "VS Installation Path: $vsPath"
          Start-Process -FilePath "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" -ArgumentList "modify", "--installPath", """$vsPath""", "--add", "Microsoft.VisualStudio.Component.VC.Tools.ARM64", "--quiet", "--norestart" -Wait -NoNewWindow

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm install

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseName: "🚀 Locsight ${{ needs.create-release.outputs.tag }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Job 3: Publish release after all builds succeed ──
  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v9
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const draft = releases.find(
              r => r.tag_name === '${{ needs.create-release.outputs.tag }}' && r.draft
            );
            if (draft) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draft.id,
                draft: false,
              });
              console.log(`Successfully published release: ${draft.name}`);
            } else {
              console.log('No matching draft release found.');
            }
