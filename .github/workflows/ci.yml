name: cli-build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_file: codebase-analyzer-linux
            binary_path: build/stage/bin/codebase_analyzer
          - os: macos-latest
            artifact_file: codebase-analyzer-macos
            binary_path: build/stage/bin/codebase_analyzer
          - os: windows-latest
            artifact_file: codebase-analyzer-windows.exe
            binary_path: build/stage/bin/codebase_analyzer.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix build/stage

      - name: Smoke test
        run: |
          $exe = Resolve-Path $env:BINARY_PATH
          & $exe.Path $PWD.Path
        env:
          BINARY_PATH: ${{ matrix.binary_path }}

      - name: Prepare artifact
        run: |
          New-Item -ItemType Directory -Force build/package | Out-Null
          Move-Item -Force $env:BINARY_PATH (Join-Path build/package $env:ARTIFACT_FILE)
        env:
          BINARY_PATH: ${{ matrix.binary_path }}
          ARTIFACT_FILE: ${{ matrix.artifact_file }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: build/package/${{ matrix.artifact_file }}
          archive: false
          if-no-files-found: error
