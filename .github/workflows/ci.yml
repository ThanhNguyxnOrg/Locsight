name: desktop-build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: codebase-analyzer-linux
            artifact_path: ui_design/release/codebase-analyzer-linux.AppImage
            smoke_path: ./release/codebase-analyzer-linux.AppImage
          - os: macos-latest
            artifact_name: codebase-analyzer-macos
            artifact_path: ui_design/release/codebase-analyzer-mac.dmg
            smoke_path: ./release/mac/Codebase Analyzer.app/Contents/MacOS/Codebase Analyzer
          - os: windows-latest
            artifact_name: codebase-analyzer-windows
            artifact_path: ui_design/release/codebase-analyzer-win.exe
            smoke_path: .\release\codebase-analyzer-win.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh
        working-directory: ui_design
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui_design/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Linux smoke deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Package
        run: npm run dist

      - name: Smoke test packaged app
        run: |
          $env:CBA_SMOKE_TEST = '1'
          if ("${{ matrix.os }}" -eq "ubuntu-latest") {
            $env:APPIMAGE_EXTRACT_AND_RUN = '1'
            chmod +x "${{ matrix.smoke_path }}"
            & xvfb-run -a "${{ matrix.smoke_path }}" --no-sandbox
          } elseif ("${{ matrix.os }}" -eq "macos-latest") {
            $bundle = Get-ChildItem release -Directory -Recurse | Where-Object { $_.Name -like "*.app" } | Select-Object -First 1
            if (-not $bundle) {
              throw "macOS app bundle not found"
            }
            & (Join-Path $bundle.FullName "Contents/MacOS/Codebase Analyzer")
          } else {
            & "${{ matrix.smoke_path }}"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          archive: false
          if-no-files-found: error

  cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: codebase-analyzer-cli-linux
            binary_path: build/codebase_analyzer
            target_name: codebase-analyzer-cli-linux
          - os: macos-latest
            artifact_name: codebase-analyzer-cli-mac
            binary_path: build/codebase_analyzer
            target_name: codebase-analyzer-cli-mac
          - os: windows-latest
            artifact_name: codebase-analyzer-cli-win
            binary_path: build/Release/codebase_analyzer.exe
            target_name: codebase-analyzer-cli-win.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test CLI Smoke Run
        run: |
          & "${{ matrix.binary_path }}"

      - name: Prepare Clean OS-Named Binary
        run: |
          New-Item -ItemType Directory -Force -Path dist_cli
          if ("${{ matrix.os }}" -eq "windows-latest") {
            Copy-Item build/Release/codebase_analyzer.exe -Destination dist_cli/codebase-analyzer-cli-win.exe
          } elseif ("${{ matrix.os }}" -eq "macos-latest") {
            Copy-Item build/codebase_analyzer -Destination dist_cli/codebase-analyzer-cli-mac
          } else {
            Copy-Item build/codebase_analyzer -Destination dist_cli/codebase-analyzer-cli-linux
          }

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target_name }}
          path: dist_cli/
          archive: false
          if-no-files-found: error
