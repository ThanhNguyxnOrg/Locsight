# Auto-Merge Dependabot PRs
# ─────────────────────────────────────────────────────────────
# Logic:
#   • minor/patch + dev deps + actions → Auto approve + merge
#   • major production deps → Label "needs-review", skip merge
# ─────────────────────────────────────────────────────────────

name: Auto-Merge Dependabot

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

      - name: Determine merge strategy
        id: strategy
        run: |
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          DEP_TYPE="${{ steps.metadata.outputs.dependency-type }}"
          ECOSYSTEM="${{ steps.metadata.outputs.package-ecosystem }}"

          echo "📦 Ecosystem: $ECOSYSTEM"
          echo "📌 Update type: $UPDATE_TYPE"
          echo "🏷️  Dep type: $DEP_TYPE"

          # Default: auto-merge
          SHOULD_MERGE="true"
          REASON="minor/patch update"

          # Major production dependencies → needs manual review
          if [[ "$UPDATE_TYPE" == "version-update:semver-major" && "$DEP_TYPE" == "direct:production" ]]; then
            SHOULD_MERGE="false"
            REASON="major production dependency — requires manual review"
          fi

          echo "should_merge=$SHOULD_MERGE" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "Decision: should_merge=$SHOULD_MERGE ($REASON)"

      # ── AUTO-MERGE PATH ──────────────────────────────────
      - name: Auto-approve PR
        if: steps.strategy.outputs.should_merge == 'true'
        run: gh pr review "$PR_URL" --approve --body "✅ Auto-approved — ${{ steps.strategy.outputs.reason }}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Enable auto-merge
        if: steps.strategy.outputs.should_merge == 'true'
        run: gh pr merge "$PR_URL" --auto --squash --body "🤖 Auto-merged by Dependabot automation"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      # ── MANUAL REVIEW PATH ──────────────────────────────
      - name: Label for manual review
        if: steps.strategy.outputs.should_merge == 'false'
        run: gh pr edit "$PR_URL" --add-label "needs-review"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Comment review needed
        if: steps.strategy.outputs.should_merge == 'false'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ **Manual review required**

          This is a **major version update** of a production dependency.
          Please review changelog for breaking changes before merging.

          > ${{ steps.strategy.outputs.reason }}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
